services:
  mongodb:
    image: mongo:7
    container_name: hospital-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo-init/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    container_name: hospital-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc
    container_name: hospital-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RADIOGRAPHIES: ${MINIO_BUCKET_RADIOGRAPHIES:-radiographies}
      MINIO_BUCKET_RAW_BACKUPS: ${MINIO_BUCKET_RAW_BACKUPS:-raw-backups}
    volumes:
      - ./docker/minio-init/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: hospital-pipeline:latest
    container_name: hospital-pipeline
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Submontajes especificos (ADR-005/006 + design clasificacion-radiografias).
      # `data/raw` es read-only (fixtures versionados); `data/models` es rw para
      # que `train.py` pueda escribir el artefacto del modelo y el reporte.
      - ./data/raw:/app/data/raw:ro
      - ./data/models:/app/data/models:rw
      - ./docs/model-evaluation:/app/docs/model-evaluation:rw
      - pipeline-db:/app/data/db:rw
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SPARK_APP_NAME: ${SPARK_APP_NAME:-hospital-pipeline}
      SPARK_MASTER: ${SPARK_MASTER:-local[*]}
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DB: ${MONGO_DB:-hospital}
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RADIOGRAPHIES: ${MINIO_BUCKET_RADIOGRAPHIES:-radiographies}
      MINIO_BUCKET_RAW_BACKUPS: ${MINIO_BUCKET_RAW_BACKUPS:-raw-backups}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/db/hospital.db}

  api:
    image: hospital-pipeline:latest
    container_name: hospital-api
    depends_on:
      mongodb:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DB: ${MONGO_DB:-hospital}
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_RADIOGRAPHIES: ${MINIO_BUCKET_RADIOGRAPHIES:-radiographies}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/db/hospital.db}
    volumes:
      # Submontajes especificos. La API solo lee fixtures y el modelo
      # entrenado; nunca los modifica. `data/models` se monta :ro.
      - ./data/raw:/app/data/raw:ro
      - ./data/models:/app/data/models:ro
      # rw aunque la API solo lee: WAL mode crea ficheros sidecar (.wal/.shm)
      # en el directorio de la base. Sin rw, SQLite falla al abrir el handle.
      - pipeline-db:/app/data/db:rw
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  watcher:
    image: hospital-pipeline:latest
    container_name: hospital-watcher
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SPARK_APP_NAME: hospital-watcher
      SPARK_MASTER: ${SPARK_MASTER:-local[*]}
      MONGO_HOST: ${MONGO_HOST:-mongodb}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DB: ${MONGO_DB:-hospital}
      MINIO_HOST: ${MINIO_HOST:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      INCOMING_DIR: /app/data/incoming
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/db/hospital.db}
    volumes:
      # rw: el watcher mueve los ficheros procesados a incoming/processed/
      - ./data/incoming:/app/data/incoming:rw
      - pipeline-db:/app/data/db:rw
    command: ["python", "-m", "src.pipeline.scripts.watcher_daemon"]

volumes:
  mongo-data:
  minio-data:
  pipeline-db:
