# Tema visual del dashboard (ADR-007 + guia de implementacion local).
# Inspiracion: Linear / Seline Analytics / Crisp Data Canvas — sobrio,
# datos primero, sin ruido. Streamlit no admite CSS profundo: estos
# colores + tipografia son lo que SI controlamos.

[theme]
base = "light"
primaryColor = "#2563EB"            # azul accent (chips OK, headers, buttons)
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA" # sidebar + tarjetas
textColor = "#0F172A"
font = "sans serif"

[server]
headless = true
runOnSave = false
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[client]
# Oculta el menu "Deploy" y otros controles de despliegue de Streamlit
# Cloud — irrelevantes para una demo academica. Soportado desde
# Streamlit 1.18+. Mantiene visible el menu de ayuda.
toolbarMode = "minimal"
showSidebarNavigation = true
